site: zhihu
name: hot
description: 知乎热榜
domain: www.zhihu.com

args:
  limit:
    type: int
    default: 20
    description: Number of items to return

pipeline:
  - navigate: https://www.zhihu.com

  - fetch:
      url: https://www.zhihu.com/api/v4/search/top_search
      params:
        limit: ${{ args.limit }}

  - select: top_search.words

  - map:
      rank: ${{ index + 1 }}
      title: ${{ item.query }}

  - limit: ${{ args.limit }}

columns: [rank, title]
